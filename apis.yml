description: >-
  The U.S. Agency for Global Media (USAGM) is an independent federal agency that oversees
  a network of media organizations aimed at providing news and information to audiences
  around the world. These media outlets, which include Voice of America, Radio Free
  Europe/Radio Liberty, Radio Free Asia, and Middle East Broadcasting Networks, operate
  in multiple languages and regions to promote freedom of the press, democratic values,
  and access to objective news.
